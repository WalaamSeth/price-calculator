services:
    sio_test:
        user: app
        build:
            context: .
            args:
                USER_ID: ${USER_ID:-1000}
        ports:
            - "8337:8337"
        volumes:
            - .:/app:rw
        environment:
            - APP_ENV=dev
            - DATABASE_URL=postgresql://app:app@database:5432/app?serverVersion=15&charset=utf8
        depends_on:
            - database

    database:
        image: postgres:15-alpine
        environment:
            POSTGRES_DB: app
            POSTGRES_USER: app
            POSTGRES_PASSWORD: app
        ports:
            - "5432:5432"
        volumes:
            - database_data:/var/lib/postgresql/data

volumes:
    database_data:
